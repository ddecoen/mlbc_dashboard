<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBC Sim League — 2001 Season Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --green: #00c853;
    --green-dim: #004d20;
    --amber: #ffab00;
    --red: #ff3d00;
    --bg: #0a0e0a;
    --surface: #111611;
    --surface2: #192019;
    --border: #1e2e1e;
    --text: #d4e8d4;
    --text-dim: #6a8a6a;
    --white: #f0f8f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,200,83,0.015) 2px,
      rgba(0,200,83,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, var(--surface) 0%, #0f1a0f 100%);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 4px;
    color: var(--white);
    text-shadow: 0 0 20px rgba(0,200,83,0.4);
    line-height: 1;
  }

  .logo span { color: var(--green); }

  .season-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--green);
    border: 1px solid var(--green-dim);
    padding: 4px 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .nav {
    display: flex;
    gap: 0;
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .nav-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 20px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
    border-bottom: 2px solid transparent;
  }

  .nav-btn:hover { color: var(--text); }
  .nav-btn.active {
    color: var(--green);
    border-bottom-color: var(--green);
  }

  .view { display: none; padding: 28px 32px; }
  .view.active { display: block; }

  /* ---- STANDINGS ---- */
  .standings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  .division-block {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .division-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--white);
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .division-header small {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  table { width: 100%; border-collapse: collapse; }

  .standings-table th {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    text-align: right;
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .standings-table th:first-child { text-align: left; }

  .standings-table td {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    text-align: right;
    border-bottom: 1px solid rgba(30,46,30,0.5);
    color: var(--text);
  }

  .standings-table td:first-child { text-align: left; }

  .standings-table tr:hover td { background: rgba(0,200,83,0.04); }

  .standings-table .leader td { color: var(--white); }
  .standings-table .leader td:first-child { color: var(--green); }

  .pct-bar {
    display: inline-block;
    height: 3px;
    background: var(--green-dim);
    vertical-align: middle;
    margin-right: 6px;
  }
  .pct-bar-fill {
    height: 100%;
    background: var(--green);
  }

  .diff-pos { color: var(--green) !important; }
  .diff-neg { color: var(--red) !important; }
  .diff-neu { color: var(--text-dim) !important; }

  /* ---- STAT LEADERS ---- */
  .leaders-section-header {
    grid-column: 1 / -1;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--amber);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin-top: 8px;
  }
  .leaders-section-grid {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .leader-name-block { flex: 1; min-width: 0; }
  .leader-subs { display: flex; gap: 8px; margin-top: 2px; flex-wrap: wrap; }
  .leader-sub {
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-dim);
    background: rgba(0,200,83,0.07);
    padding: 1px 5px;
    border-radius: 2px;
  }
  .leader-extra {
    font-size: 9px;
    color: var(--text-dim);
    margin-left: 4px;
  }
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .leader-card {
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .leader-card-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: var(--white);
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .stat-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    background: var(--green-dim);
    color: var(--green);
    letter-spacing: 1px;
  }

  .leader-row {
    display: flex;
    align-items: flex-start;
    padding: 8px 16px;
    border-bottom: 1px solid rgba(30,46,30,0.4);
    gap: 10px;
    cursor: default;
    transition: background 0.15s;
  }
  .leader-row:hover { background: rgba(0,200,83,0.04); }

  .leader-rank {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    width: 16px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .leader-rank.top { color: var(--amber); }

  .leader-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .leader-team {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .leader-stat {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--green);
    width: 56px;
    text-align: right;
    flex-shrink: 0;
  }

  .leader-bar-wrap {
    width: 60px;
    height: 3px;
    background: var(--green-dim);
    flex-shrink: 0;
  }
  .leader-bar {
    height: 100%;
    background: var(--green);
  }

  /* ---- BOX SCORE / RESULTS ---- */
  .results-container {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 20px;
    height: calc(100vh - 160px);
  }

  .results-list {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow-y: auto;
  }

  .results-list-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .results-filter {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    outline: none;
    flex: 1;
  }

  .game-row {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(30,46,30,0.4);
    cursor: pointer;
    transition: background 0.1s;
  }
  .game-row:hover, .game-row.selected { background: rgba(0,200,83,0.06); }
  .game-row.selected { border-left: 2px solid var(--green); }

  .game-row-teams {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3px;
  }

  .game-team { font-size: 12px; font-weight: 500; }
  .game-score {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
  }
  .game-score .winner { color: var(--white); }
  .game-score .loser { color: var(--text-dim); }

  .game-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .boxscore-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 24px;
  }

  .boxscore-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .boxscore-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--white);
    margin-bottom: 4px;
  }

  .boxscore-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .linescore {
    width: 100%;
    margin-bottom: 20px;
    border-collapse: collapse;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
  }

  .linescore th {
    color: var(--text-dim);
    text-align: center;
    padding: 4px 6px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    width: 24px;
  }
  .linescore th:first-child { text-align: left; width: auto; }

  .linescore td {
    text-align: center;
    padding: 5px 6px;
    color: var(--text);
  }
  .linescore td:first-child { text-align: left; font-size: 12px; font-weight: 500; }
  .linescore .final-col { font-weight: 600; color: var(--white); border-left: 1px solid var(--border); }
  .linescore .win-row td { color: var(--green); }
  .linescore .win-row td:first-child { color: var(--white); }

  .boxscore-section {
    margin-bottom: 18px;
  }

  .boxscore-section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 5px;
    margin-bottom: 8px;
  }

  .boxscore-text {
    font-size: 11px;
    line-height: 1.7;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

  .loading {
    text-align: center;
    padding: 40px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    50% { opacity: 0.3; }
  }

  .stat-summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
  }

  .stat-box-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-box-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--green);
    line-height: 1;
    margin-bottom: 2px;
  }

  .stat-box-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
  }

  @media (max-width: 1100px) {
    .standings-grid, .leaders-grid { grid-template-columns: 1fr; }
    .results-container { grid-template-columns: 1fr; height: auto; }
  }
</style>
</head>

function pct(w, l) { return w / (w + l); }
function gb(teamW, teamL, leaderW, leaderL) {
  const diff = ((leaderW - teamW) + (teamL - leaderL)) / 2;
  return diff === 0 ? '—' : diff.toFixed(1);
}

function renderStandings() {
  const sorted = [...standings].sort((a,b) => pct(b.w,b.l) - pct(a.w,a.l));
  const half = Math.ceil(sorted.length / 2);
  const left = sorted.slice(0, half);
  const right = sorted.slice(half);
  
  function renderBlock(teams, title) {
    const leader = teams[0];
    let html = `<div class="division-block">
      <div class="division-header">${title} <small>W · L · PCT · DIFF</small></div>
      <table class="standings-table">
        <thead><tr>
          <th>Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th><th>R</th><th>RA</th><th>DIFF</th>
        </tr></thead>
        <tbody>`;
    teams.forEach((t, i) => {
      const p = pct(t.w, t.l);
      const diff = t.r - t.ra;
      const diffClass = diff > 0 ? 'diff-pos' : diff < 0 ? 'diff-neg' : 'diff-neu';
      const leaderClass = i === 0 ? 'leader' : '';
      const gbVal = i === 0 ? '—' : gb(t.w, t.l, leader.w, leader.l);
      html += `<tr class="${leaderClass}">
        <td>${t.team}</td>
        <td>${t.w}</td>
        <td>${t.l}</td>
        <td>${p.toFixed(3)}</td>
        <td>${gbVal}</td>
        <td>${t.r}</td>
        <td>${t.ra}</td>
        <td class="${diffClass}">${diff>0?'+':''}${diff}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
    return html;
  }
  
  document.getElementById('standings-left').innerHTML = renderBlock(left, 'American Circuit');
  document.getElementById('standings-right').innerHTML = renderBlock(right, 'National Circuit');
}

function renderLeaders() {
  const grid = document.getElementById('leaders-grid');
  // Group categories into sections
  const sections = [
    { label: "BATTING", cats: ["HR","SB","RC","bWAR","OPS","OPS+","wOBA"] },
    { label: "PITCHING", cats: ["pWAR","ERA","xFIP","QS","WINS","SAVES"] },
    { label: "TEAM", cats: ["RUN DIFF +","RUN DIFF −"] },
  ];
  const lowerIsBetter = new Set(["ERA","xFIP"]);
  let html = '';
  for (const section of sections) {
    html += `<div class="leaders-section-header">${section.label}</div>`;
    html += `<div class="leaders-section-grid">`;
    for (const cat of section.cats) {
      const players = leaders[cat];
      if (!players) continue;
      // For bar scaling: lower-is-better needs inverted bars
      const isLower = lowerIsBetter.has(cat);
      const statVals = players.map(p => p.statRaw !== undefined ? p.statRaw : (typeof p.stat === 'number' ? p.stat : parseFloat(p.stat)));
      const maxVal = Math.max(...statVals);
      const minVal = Math.min(...statVals);
      html += `<div class="leader-card">
        <div class="leader-card-header">${cat} <span class="stat-badge">LEADERS</span></div>`;
      players.forEach((p, i) => {
        const val = p.statRaw !== undefined ? p.statRaw : (typeof p.stat === 'number' ? p.stat : parseFloat(p.stat));
        const barPct = isLower
          ? ((maxVal - val) / (maxVal - minVal + 0.001)) * 100
          : (val / maxVal) * 100;
        const rankClass = i < 3 ? 'top' : '';
        const extra = p.extra ? `<span class="leader-extra">${p.extra}</span>` : '';
        const sub1 = p.sub1 ? `<span class="leader-sub">${p.sub1}</span>` : '';
        const sub2 = p.sub2 ? `<span class="leader-sub">${p.sub2}</span>` : '';
        html += `<div class="leader-row">
          <div class="leader-rank ${rankClass}">${i+1}</div>
          <div class="leader-name-block">
            <div class="leader-name">${p.name}</div>
            <div class="leader-subs">${sub1}${sub2}</div>
          </div>
          <div class="leader-bar-wrap"><div class="leader-bar" style="width:${barPct.toFixed(0)}%"></div></div>
          <div class="leader-stat">${p.stat}${extra}</div>
        </div>`;
      });
      html += '</div>';
    }
    html += `</div>`;
  }
  grid.innerHTML = html;
}

        <tr class="${!awayWin ? 'win-row' : ''}">
          <td>${g.home}</td>
          ${g.homeInnings ? g.homeInnings.map(x=>`<td>${x}</td>`).join('') : '<td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td><td>—</td>'}
          <td class="final-col">${g.homeR}</td>
          <td class="final-col">${g.homeH !== undefined ? g.homeH : '—'}</td>
          <td class="final-col">${g.homeE !== undefined ? g.homeE : '—'}</td>
        </tr>
      </tbody>
    </table>
    
    <div class="boxscore-section">
      <div class="boxscore-section-title">Result</div>
      <div class="boxscore-text">${winner} defeats ${loser}, ${winScore}-${loseScore}.

Full inning-by-inning breakdown and player statistics are available in the BoxScores.txt file.
This dashboard displays parsed summary data from the High Heat 2003 simulation engine.</div>
    </div>
    
    <div class="boxscore-section">
      <div class="boxscore-section-title">Season Context</div>
      <div class="boxscore-text">Game ${g.day} of 162 — ${g.day <= 54 ? 'Early Season' : g.day <= 108 ? 'Mid Season' : 'Late Season'}

${awayWin ? g.away : g.home} continue their campaign in the 2001 MLBC Sim League season.
League leader: Edmonton Trappers (78-51, .605, +194 run differential)</div>
    </div>
  `;
}

function renderHallOfFame() {
  const hof = document.getElementById('hof-content');
  hof.innerHTML = `
    <div style="max-width:900px;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:4px;color:var(--white);margin-bottom:4px;">Hall of Fame</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-bottom:28px;">Active legends tracked in HallOfFamers.txt</div>

      ${renderHOFPlayer("Randy Johnson", 39, "LHP", [
        {label:"Career ERA",val:"3.14"},{label:"IP",val:"2,956.7"},{label:"Wins",val:"212"},{label:"K",val:"3,686"},{label:"K/9",val:"11.2"},{label:"W%",val:".650"}
      ], "The Big Unit posted remarkable seasons, including a 2.28 ERA in 1997 (20W, 291K) and 2.48 ERA in 1995 (18W, 294K). Still active at 39, Johnson remains an elite strikeout threat.")}
      
      ${renderHOFPlayer("Roger Clemens", 40, "RHP", [
        {label:"Career ERA",val:"3.15"},{label:"IP",val:"4,128.0"},{label:"Wins",val:"300"},{label:"K",val:"3,467"},{label:"ShO",val:"47"},{label:"W%",val:".662"}
      ], "The Rocket has reached 300 wins with a career ERA of 3.15. His 1990 season (1.93 ERA, 21W) and 1997 Cy Young run (2.05 ERA, 21W) stand as league-era classics.")}
      
      ${renderHOFPlayer("Ellis Burks", 38, "OF/DH", [
        {label:"Career AVG",val:".291"},{label:"OPS",val:"1.003"},{label:"HR",val:"347"},{label:"RBI",val:"1,200"},{label:"SB",val:"183"},{label:"EQA",val:".286"}
      ], "Burks delivered his best season in 1996 (.344/.404/.639, 40 HR, 128 RBI) and 2000 (.344 AVG, 1.140 OPS). A consistent power-speed threat throughout his career.")}
    </div>`;
}

function renderHOFPlayer(name, age, pos, stats, bio) {
  const statItems = stats.map(s => `
    <div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-bottom:3px;">${s.label}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--green);line-height:1;">${s.val}</div>
    </div>
  `).join('');
  
  return `<div style="background:var(--surface);border:1px solid var(--border);padding:24px;margin-bottom:20px;">
    <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:16px;">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--white);">${name}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-dim);">Age ${age}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--green-dim);color:var(--green);padding:2px 8px;letter-spacing:1px;">${pos}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);">
      ${statItems}
    </div>
    <div style="font-size:12px;line-height:1.8;color:var(--text);max-width:700px;">${bio}</div>
  </div>`;
}

// ===================== NAV =====================
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  event.target.classList.add('active');
}

// ===================== INIT =====================
renderStandings();
renderLeaders();
buildGamesList();
renderHallOfFame();
</script>
</body>
</html>
